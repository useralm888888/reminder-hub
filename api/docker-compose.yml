services:
  postgres:
    image: postgres:16
    container_name: reminder-postgres
    ports:
      - "5443:5432"
    environment:
      POSTGRES_DB: reminders
      POSTGRES_USER: reminder
      POSTGRES_PASSWORD: reminder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reminder -d reminders"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reminder-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=reminders;Username=reminder;Password=reminder"
      Database__ApplyMigrationsOnStartup: "true"
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  api_logs:
